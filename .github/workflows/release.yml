name: Release

on:
  push:
    tags:
      - "v*"

# Trusted Publishing (OIDC) notes:
# - In PyPI, create the project once (or upload the first release manually).
# - Then configure a "Trusted Publisher" for this repo/workflow so PyPI accepts
#   OIDC tokens from GitHub Actions without any stored secrets.
# - PyPI will ask for: Owner, Repository name, and this workflow filename
#   (`release.yml`). If you use GitHub Environments, include that too.

permissions:
  contents: read
  id-token: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build distributions
        run: |
          python -m pip install -U pip
          python -m pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

